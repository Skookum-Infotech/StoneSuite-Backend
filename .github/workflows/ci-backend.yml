name: Backend CI

# Runs on every PR and push before the deploy workflow (which only fires on
# merge to master). Gates merges on build, vet, tests, and a vulnerability
# scan of the module's dependencies.
on:
  pull_request:
  push:
    branches: [develop, master]

jobs:
  build-test:
    name: Build · Vet · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: go.sum
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
