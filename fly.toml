app            = "stonesuite-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT                = "8080"
  CORS_ORIGIN         = "https://dev.stonesuite.app"
  FRONTEND_URL        = "https://dev.stonesuite.app"
  SMTP_PORT           = "587"
  INVITE_EXPIRY_HOURS = "24"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [http_service.concurrency]
    type        = "requests"
    soft_limit  = 200
    hard_limit  = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/api"
    timeout      = "5s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
