app            = "stonesuite-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT                = "8080"
  CORS_ORIGIN         = "https://dev.stonesuite.app"
  FRONTEND_URL        = "https://dev.stonesuite.app"
  SMTP_PORT           = "587"
  INVITE_EXPIRY_HOURS = "24"

  # Cloudflare R2 — non-secret config (account ID and bucket name are not sensitive).
  # Secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY) must be set via:
  #   fly secrets set R2_ACCESS_KEY_ID=<key> R2_SECRET_ACCESS_KEY=<secret>
  #
  # R2_ACCOUNT_ID  = "your-cf-account-id"   # found in Cloudflare dashboard → R2
  # R2_BUCKET      = "stonesuite-attachments"
  #
  # R2 Bucket CORS (configure in Cloudflare Dashboard → R2 → <bucket> → Settings → CORS):
  # Allow origins: https://dev.stonesuite.app (CORS_ORIGIN / FRONTEND_URL above).
  # Allow methods: PUT, GET
  # Allow headers: Content-Type
  # Max-Age: 300
  # This is a dashboard-only setting; it is documented here for operator reference.

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [http_service.concurrency]
    type        = "requests"
    soft_limit  = 200
    hard_limit  = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/api"
    timeout      = "5s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
