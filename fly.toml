app            = "stonesuite-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT                = "8080"
  # IMPORTANT: CORS_ORIGIN and FRONTEND_URL must match the exact origin of the deployed
  # frontend (including protocol and port). Verify this matches the Cloudflare Pages URL
  # before deploying. A mismatch will block all browser API calls with CORS 403 errors.
  CORS_ORIGIN         = "https://dev.stonesuite.app"
  FRONTEND_URL        = "https://dev.stonesuite.app"
  SMTP_PORT           = "587"
  INVITE_EXPIRY_HOURS = "24"

  # Cloudflare R2 — non-secret config (account ID and bucket name are not sensitive).
  # Secrets (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY) must be set via:
  #   fly secrets set R2_ACCESS_KEY_ID=<key> R2_SECRET_ACCESS_KEY=<secret>
  #
  # R2 (per-tenant isolated buckets — no shared bucket):
  # Secrets (set via fly secrets set):
  #   R2_ACCOUNT_ID          — Cloudflare account ID (found in R2 dashboard)
  #   R2_ACCESS_KEY_ID       — R2 API token key ID (S3-compat credentials)
  #   R2_SECRET_ACCESS_KEY   — R2 API token secret
  #   CLOUDFLARE_API_TOKEN   — Cloudflare API token with Account:R2:Edit permission
  #   CLOUDFLARE_ACCOUNT_ID  — same as R2_ACCOUNT_ID
  # Each tenant gets an isolated bucket named ss-{slug} with CORS set from CORS_ORIGIN.

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0
  processes            = ["app"]

  [http_service.concurrency]
    type        = "requests"
    soft_limit  = 200
    hard_limit  = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval     = "15s"
    method       = "GET"
    path         = "/api"
    timeout      = "5s"

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
