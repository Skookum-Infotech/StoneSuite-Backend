app            = "stonesuite-ollama"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  AI_EMBED_MODEL = "snowflake-arctic-embed:m"
  # Chat model for the fully self-hosted LLM path (ai/ollama_llm.go). Bumped
  # from llama3.2:1b to :3b (~2GB) after live use showed the 1b model
  # over-refusing and citing unreliably even when relevant context was
  # retrieved — 3b is a meaningfully better instruction-follower and still
  # fits this box's 4gb alongside the ~0.5GB embedder. Still noticeably
  # slower and weaker than a large hosted model — the tradeoff for running
  # fully self-hosted with no third-party account, key, or quota.
  AI_CHAT_MODEL = "llama3.2:3b"
  # Keep both the embed and chat models resident at once instead of evicting
  # one to load the other on every request (Ollama's default swaps models
  # under memory pressure) — every /ai/ask call uses both back to back.
  OLLAMA_MAX_LOADED_MODELS = "2"

[http_service]
  internal_port        = 11434
  # Internal-only service: no public IP is ever allocated for this app (see
  # deploy notes). Traffic reaches it exclusively via Fly's private network —
  # http://stonesuite-ollama.internal:11434 (direct 6PN — see deploy notes for
  # why not flycast) — so plain HTTP is fine here; it never leaves Fly's
  # WireGuard mesh.
  force_https          = false
  # Lifecycle is owned entirely by stonesuite-backend (see
  # services/OllamaLifecycle + main.go), not Fly's own scaling: verified live
  # that Fly Proxy's auto_start_machines does not reliably wake this Machine
  # on organic flycast traffic (machine event log showed zero start attempts
  # across multiple real /ai/ask requests). The backend starts this Machine
  # on its own boot and stops it on its own graceful shutdown via Fly's
  # Machines API, so Ollama is up exactly when the backend is — min_machines
  # _running=0 so Fly never overrides that by force-restarting it.
  auto_stop_machines    = "off"
  auto_start_machines   = false
  min_machines_running  = 0
  processes             = ["app"]

[mounts]
  source      = "ollama_data"
  destination = "/root/.ollama"

[[vm]]
  # Bumped from shared/2gb after a live chat request took 73s and still timed
  # out (ai/ollama_llm.go's 60s client timeout) with both models loaded.
  # CPU-bound LLM inference suffers badly on a "shared" vCPU (noisy-neighbor
  # throttling) — "performance" gives a dedicated core, which matters far more
  # here than raw core count. 4gb RAM gives headroom for KV-cache during
  # generation on top of both models' resident weights (~1.5GB). This is a
  # fixed, modest Fly cost (still scale-to-zero — nothing while idle), not a
  # per-request API bill.
  memory   = "4gb"
  cpu_kind = "performance"
  cpus     = 1
