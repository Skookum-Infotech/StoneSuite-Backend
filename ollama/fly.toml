app            = "stonesuite-ollama"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  AI_EMBED_MODEL = "snowflake-arctic-embed:m"

[http_service]
  internal_port        = 11434
  # Internal-only service: no public IP is ever allocated for this app (see
  # deploy notes). Traffic reaches it exclusively via Fly's private network —
  # http://stonesuite-ollama.flycast:11434 — so plain HTTP is fine here; it
  # never leaves Fly's WireGuard mesh.
  force_https          = false
  # Mirrors stonesuite-backend's scale-to-zero: Fly Proxy auto-starts this
  # Machine (via flycast) the moment the backend calls it, and stops it again
  # after idling — so it's only ever running while the backend is handling
  # embed-dependent requests.
  auto_stop_machines    = "stop"
  auto_start_machines   = true
  min_machines_running  = 0
  processes             = ["app"]

[mounts]
  source      = "ollama_data"
  destination = "/root/.ollama"

[[vm]]
  memory   = "2gb"
  cpu_kind = "shared"
  cpus     = 1
